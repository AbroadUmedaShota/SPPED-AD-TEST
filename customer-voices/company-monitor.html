<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SPEED AD の先行利用モニター企業の導入事例です。">
  <title>先行利用モニター企業 | SPEED AD お客様のお声</title>
  <link rel="icon" href="../img/logo2.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="voice-page" data-voice-slug="company-monitor">
  <header class="voice-header">
    <div class="voice-header__inner">
      <a class="voice-brand" href="../index.html">
        <img class="voice-brand__mark" src="../img/logo.svg" alt="SPEED AD">
        <span class="voice-brand__copy">
          <span class="voice-brand__eyebrow">Customer Voices</span>
          <span class="voice-brand__title">お客様のお声</span>
        </span>
      </a>
      <nav class="voice-nav" aria-label="導入事例ページのナビゲーション">
        <a class="voice-nav__link" href="./index.html">一覧へ戻る</a>
        <a class="voice-button voice-button--primary" href="../index.html?intent=signup#top">無料ではじめる</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="voice-shell">
      <section class="voice-detail-hero">
        <div class="voice-detail-hero__inner">
          <div data-reveal>
            <p class="voice-eyebrow" id="voice-hero-eyebrow">導入事例</p>
            <h1 class="voice-detail-hero__title" id="voice-hero-title">読み込み中...</h1>
            <p class="voice-detail-hero__lead" id="voice-hero-lead">導入事例データを読み込んでいます。</p>
            <div class="voice-detail-hero__meta" id="voice-hero-meta"></div>
            <div class="voice-detail-hero__actions">
              <a class="voice-button voice-button--primary" href="../index.html?intent=signup#top">無料ではじめる</a>
              <a class="voice-button voice-button--secondary" href="../index.html#top">ログインはこちら</a>
            </div>
          </div>
          <div class="voice-detail-hero__media" data-reveal>
            <img id="voice-hero-image" src="../img/pic2.jpg" alt="導入事例イメージ">
          </div>
        </div>
      </section>

      <div class="voice-detail-layout">
        <div class="voice-detail-main" id="voice-detail-main">
          <section class="voice-detail-section" id="voice-overview" data-reveal>
            <h2>概要</h2>
            <div class="voice-detail-body" id="voice-overview-body"></div>
          </section>

          <section class="voice-detail-section" id="voice-challenge" data-reveal>
            <h2>導入前の課題</h2>
            <div class="voice-detail-body" id="voice-challenge-body"></div>
          </section>

          <section class="voice-detail-section" id="voice-operation" data-reveal>
            <h2>運用イメージ</h2>
            <div class="voice-detail-body" id="voice-operation-body"></div>
          </section>

          <section class="voice-detail-section" id="voice-outcome" data-reveal>
            <h2>導入後の変化</h2>
            <div class="voice-detail-body" id="voice-outcome-body"></div>
          </section>
        </div>

        <aside class="voice-detail-aside" id="voice-detail-aside">
          <section class="voice-detail-card" id="voice-features" data-reveal>
            <h2>利用した機能</h2>
            <div class="voice-detail-body" id="voice-features-body"></div>
          </section>

          <section class="voice-detail-card" id="voice-quote" data-reveal>
            <h2>担当者コメント</h2>
            <div class="voice-quote">
              <p class="voice-quote__text" id="voice-quote-text"></p>
              <p class="voice-quote__meta" id="voice-quote-meta"></p>
            </div>
          </section>
        </aside>
      </div>

      <section class="voice-cta" data-reveal>
        <h2>次の行動</h2>
        <p>
          先行利用の事例は、会場での回収導線と会期後の初動を整えるところから始まっています。
          自社のイベント運用でもまずは無料で導線を作り、必要な機能を段階的に広げられます。
        </p>
        <div class="voice-cta__actions">
          <a class="voice-button voice-button--secondary" href="./index.html">他の事例を見る</a>
          <a class="voice-button voice-button--primary" href="../index.html?intent=signup#top">無料ではじめる</a>
        </div>
      </section>

      <footer class="voice-footer">
        <p>公開可能な範囲で内容を要約し、匿名化した導入事例です。</p>
        <a class="voice-nav__link" href="../index.html#top">ログイン前ページへ戻る</a>
      </footer>
    </div>
  </main>

  <script type="module" src="./detail.js"></script>
</body>
</html>
