<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>help/FAQ レビュー記入表</title>
<style>
  *{box-sizing:border-box}
  body{font-family:"Yu Gothic","Meiryo","Hiragino Sans",sans-serif;font-size:13px;color:#1a2533;margin:0;padding:10px;background:#f5f8fd}
  h1{font-size:17px;margin:0 0 4px}
  .lead{font-size:12px;color:#54657d;margin:2px 0 8px}

  .toolbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    margin:6px 0 8px;padding:8px 10px;background:#1f3a5f;color:#fff;border-radius:6px;font-size:12px}
  .toolbar button{font:inherit;font-size:12px;padding:5px 10px;background:#fff;color:#1f3a5f;border:none;border-radius:4px;cursor:pointer;font-weight:700}
  .toolbar button:hover{background:#dce6f0}
  .toolbar input.who{font:inherit;font-size:12px;padding:5px 8px;border:none;border-radius:4px;width:140px}
  .toolbar select{font:inherit;font-size:12px;padding:4px;border:none;border-radius:4px}
  .toolbar .count{margin-left:auto;font-weight:700}
  .toolbar .stat{font-size:11.5px;opacity:.9}

  /* タブ */
  .tabs{display:flex;gap:6px;margin:0 0 10px}
  .tab{font:inherit;font-size:13px;font-weight:700;padding:8px 16px;border:1px solid #c9d6e5;border-bottom:none;
    border-radius:8px 8px 0 0;background:#e7eef7;color:#46586f;cursor:pointer}
  .tab.active{background:#fff;color:#1f3a5f;border-color:#1f3a5f;border-bottom:2px solid #fff;margin-bottom:-1px}
  .tabsec{display:none}
  .tabsec.active{display:block}
  .filters{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:0 0 10px;font-size:12px;color:#46586f}
  .filters select,.filters label{font-size:12px}

  /* カード（回答内容レビュー） */
  .card{background:#fff;border:1px solid #c9d6e5;border-radius:12px;padding:14px 16px;margin:0 0 12px;box-shadow:0 6px 18px -14px rgba(16,41,77,.4)}
  .card.is-done{border-color:#9bd4ab;background:#f3fbf5}
  .card-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
  .badge{font-family:monospace;font-size:11px;background:#eef2ff;color:#1d4ed8;padding:2px 8px;border-radius:999px}
  .chip{font-size:11px;background:#eef3f9;color:#46586f;padding:2px 9px;border-radius:999px;font-weight:700}
  .open{margin-left:auto;font-size:12px;font-weight:700;color:#1d4ed8;text-decoration:none;border:1px solid #c9d9f2;border-radius:6px;padding:4px 10px}
  .open:hover{background:#1d4ed8;color:#fff}
  .done-toggle{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:#15803d;cursor:pointer;background:#f0fdf4;border:1px solid #bbe7c6;border-radius:8px;padding:4px 10px}
  .done-toggle input{transform:scale(1.3);cursor:pointer}
  .q{font-size:15px;font-weight:800;color:#10294d;margin:2px 0 6px}
  .content{font-size:13px;color:#33455c;line-height:1.7;white-space:pre-wrap;background:#fbfdff;border:1px solid #e3ebf6;border-radius:8px;padding:10px 12px;max-height:300px;overflow:auto}
  .edit{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap}
  .edit .col{flex:1;min-width:240px}
  .edit .lbl{font-size:11.5px;font-weight:800;color:#46586f;margin:0 0 4px}
  .copy-btn{font:inherit;font-size:11px;color:#1d4ed8;background:#fff;border:1px solid #c9d9f2;border-radius:6px;padding:3px 9px;cursor:pointer;margin-bottom:5px}
  .copy-btn:hover{background:#1d4ed8;color:#fff}
  .fix-input{width:100%;padding:7px 9px;font:inherit;font-size:12.5px;border:1px solid #d6c89b;border-radius:6px;background:#fffefa;resize:vertical;min-height:70px}
  .fix-input.has-value{background:#fff3cf}
  .comment-input{width:100%;padding:7px 9px;font:inherit;font-size:12.5px;border:1px solid #c5d9c5;border-radius:6px;background:#fafffa;resize:vertical;min-height:70px}
  .fix-input:focus,.comment-input:focus{outline:none;border-color:#1f3a5f;background:#fff}

  /* 表（項目をまたいだ矛盾） */
  table{border-collapse:collapse;width:100%;table-layout:fixed}
  th,td{border:1px solid #c9d6e5;padding:6px 8px;vertical-align:top;word-wrap:break-word;overflow-wrap:anywhere}
  th{background:#1f3a5f;color:#fff;font-size:11.5px;text-align:left;position:sticky;top:var(--toolbar-h,46px);z-index:5}
  tr:nth-child(even) td{background:#f6f9fc}
  tr.is-done td{background:#eefaf0}
  td.id{font-family:monospace;font-size:10.5px;white-space:nowrap}
  td.src{font-size:11px;color:#46586f}
  td.claim{font-size:12.5px}
  td.kind{font-size:11px;white-space:nowrap}
  td.note{font-size:11px;color:#9a6a1a}
  td.tcomment{background:#f4faf4}
  td.tdone{text-align:center;background:#eef4fd}
  col.c-id{width:11%} col.c-src{width:12%} col.c-claim{width:27%} col.c-kind{width:9%} col.c-note{width:17%} col.c-com{width:17%} col.c-done{width:7%}
  .tdone input{transform:scale(1.4);cursor:pointer}
  .t-comment-input{width:100%;padding:5px 7px;font:inherit;font-size:12px;border:1px solid #c5d9c5;border-radius:5px;background:#fafffa;resize:vertical;min-height:48px}

  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#10294d;color:#fff;padding:9px 16px;border-radius:999px;font-size:12.5px;font-weight:700;opacity:0;transition:opacity .2s;z-index:30}
  .toast.show{opacity:1}
</style></head>
<body>
<h1>help/FAQ レビュー記入表</h1>
<p class="lead">入力は <b>15秒ごとに自動でスプシと同期</b>（共同編集可）。GAS未設定時はこのブラウザ内に自動保存。</p>

<div class="toolbar">
  <label>記入者 <input class="who" id="who" placeholder="あなたの名前"></label>
  <button type="button" id="btn-fetch">最新を取得</button>
  <button type="button" id="btn-csv">CSVダウンロード</button>
  <span class="stat" id="sync-status">—</span>
  <span class="count" id="count">確認済 0 / 0</span>
</div>

<div class="tabs">
  <button type="button" class="tab active" data-tab="review" id="tabbtn-review">回答内容レビュー</button>
  <button type="button" class="tab" data-tab="clash" id="tabbtn-clash">項目をまたいだ矛盾</button>
</div>

<section id="tab-review" class="tabsec active">
  <div class="filters">
    <label>種別:
      <select id="filter-type"><option value="">全て</option><option value="FAQ">FAQ</option><option value="ヘルプ">ヘルプ記事</option></select>
    </label>
    <label><input type="checkbox" id="only-todo"> 未確認のみ</label>
    <span>help記事1本／FAQ1問ごとに、設問に対する回答内容が正しいか確認。正しければ「確認OK」、直すなら「原文コピー→修正」。</span>
  </div>
  <div id="cards"><!--CARDS--></div>
</section>

<section id="tab-clash" class="tabsec">
  <p class="lead">1項目だけ読んでも気づけない、別々の項目どうしの食い違い（カードブランドの差・存在しないプラン名など）。コメントと確認だけ記入。</p>
  <table id="clash-table">
  <colgroup><col class="c-id"><col class="c-src"><col class="c-claim"><col class="c-kind"><col class="c-note"><col class="c-com"><col class="c-done"></colgroup>
  <thead><tr><th>ID</th><th>出典</th><th>主張内容（原文）</th><th>種別</th><th>備考（事実）</th><th>レビューコメント</th><th>確認済み</th></tr></thead>
  <tbody><!--CLASHROWS--></tbody>
  </table>
</section>

<div class="toast" id="toast"></div>

<script>
(function(){
  // === GASウェブアプリURL（デプロイ後にここを差し替える）===
  // docs/help_faq_棚卸し/gas/Code.gs を新規スプシにデプロイし、/exec URL をここに貼る。
  var GAS_WEB_APP_URL = '__GAS_URL__';
  if (GAS_WEB_APP_URL.indexOf('script.google.com') < 0) GAS_WEB_APP_URL = '';

  var STORAGE_PREFIX = 'hfreview:';
  var EDITOR_NAME_KEY = 'hfreview:editor';
  var POLL_MS = 15000;

  function setStat(t){ var el=document.getElementById('sync-status'); if(el) el.textContent=t; }
  function getEditor(){
    var n=document.getElementById('who').value.trim();
    if(n){ localStorage.setItem(EDITOR_NAME_KEY,n); return n; }
    return localStorage.getItem(EDITOR_NAME_KEY)||'匿名';
  }

  // ---- localStorage ----
  function loadRow(id){ var raw=localStorage.getItem(STORAGE_PREFIX+id); if(!raw) return null; try{return JSON.parse(raw);}catch(e){return null;} }
  function saveLocal(id,fix,memo,done){
    var next={fix:fix||'',memo:memo||'',done:done?'1':''};
    if(!next.fix&&!next.memo&&!next.done) localStorage.removeItem(STORAGE_PREFIX+id);
    else localStorage.setItem(STORAGE_PREFIX+id,JSON.stringify(next));
  }

  // ---- 保存(POST no-cors) : adopt=修正後 / memo=コメント / status=確認済み ----
  var pushQueue={}, pushTimer=null;
  function queuePush(id,fix,memo,done){
    if(!GAS_WEB_APP_URL){ setStat('ローカル保存のみ（GAS未設定）'); return; }
    pushQueue[id]={fix:fix||'',memo:memo||'',done:done};
    if(pushTimer) clearTimeout(pushTimer);
    pushTimer=setTimeout(flushPush,600);
  }
  function flushPush(){
    pushTimer=null;
    var ids=Object.keys(pushQueue); if(!ids.length) return;
    var editor=getEditor();
    var ops=ids.map(function(id){ var v=pushQueue[id]; return {id:id,adopt:v.fix,memo:v.memo,judge:'',status:v.done?'確認済み':'',editor:editor}; });
    pushQueue={};
    setStat('保存中… '+ops.length+'件');
    fetch(GAS_WEB_APP_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({ops:ops})})
      .then(function(){ setStat('保存送信 '+ops.length+'件 '+new Date().toLocaleTimeString()); })
      .catch(function(e){ setStat('保存失敗: '+e); });
  }

  // ---- 取得(JSONP) ----
  var jsonpN=0;
  function fetchServer(){
    if(!GAS_WEB_APP_URL){ setStat('ローカル保存のみ（GAS未設定）'); return; }
    setStat('取得中…');
    var cb='__hf_jsonp_'+(++jsonpN)+'_'+Date.now();
    var s=document.createElement('script'), timer=null;
    function cleanup(){ try{delete window[cb];}catch(e){window[cb]=undefined;} if(s.parentNode) s.parentNode.removeChild(s); if(timer) clearTimeout(timer); }
    window[cb]=function(j){
      cleanup();
      if(!j||!j.ok){ setStat('取得失敗: '+((j&&j.error)||'unknown')); return; }
      var data=j.data||{}, applied=0;
      Object.keys(data).forEach(function(id){
        var node=document.querySelector('[data-row-id="'+cssEsc(id)+'"]'); if(!node) return;
        var d=data[id];
        var fi=node.querySelector('.fix-input'); if(fi) fi.value=d.adopt||'';
        var mi=node.querySelector('.comment-input,.t-comment-input'); if(mi) mi.value=d.memo||'';
        var db=node.querySelector('.done-box'); if(db) db.checked=(d.status==='確認済み');
        saveLocal(id,d.adopt||'',d.memo||'',db&&db.checked);
        highlight(node); applied++;
      });
      updateCount();
      setStat('取得完了 '+applied+'件 '+new Date().toLocaleTimeString());
    };
    s.onerror=function(){ cleanup(); setStat('取得失敗: ネットワーク'); };
    var sep=GAS_WEB_APP_URL.indexOf('?')>=0?'&':'?';
    s.src=GAS_WEB_APP_URL+sep+'callback='+encodeURIComponent(cb);
    timer=setTimeout(function(){ cleanup(); setStat('取得タイムアウト'); },15000);
    document.head.appendChild(s);
  }

  // ---- ノード（カード or 行）共通処理 ----
  function readNode(node){
    var fi=node.querySelector('.fix-input');
    var mi=node.querySelector('.comment-input,.t-comment-input');
    var db=node.querySelector('.done-box');
    return { fix: fi?fi.value:'', memo: mi?mi.value:'', done: db?db.checked:false };
  }
  function saveAndQueue(id,node){
    var v=readNode(node);
    saveLocal(id,v.fix,v.memo,v.done);
    queuePush(id,v.fix,v.memo,v.done);
  }
  function highlight(node){
    var fi=node.querySelector('.fix-input'); if(fi) fi.classList.toggle('has-value',!!fi.value.trim());
    var db=node.querySelector('.done-box'); node.classList.toggle('is-done', !!(db&&db.checked));
  }
  function updateCount(){
    var total=document.querySelectorAll('[data-row-id]').length, n=0;
    document.querySelectorAll('.done-box').forEach(function(b){ if(b.checked) n++; });
    var el=document.getElementById('count'); if(el) el.textContent='確認済 '+n+' / '+total;
  }

  function processNode(node){
    var id=node.getAttribute('data-row-id'); if(!id) return;
    var contentEl=node.querySelector('.content'); var contentText=contentEl?contentEl.textContent:'';
    var fi=node.querySelector('.fix-input');
    if(fi) fi.addEventListener('input',function(){ saveAndQueue(id,node); highlight(node); });
    var copy=node.querySelector('.copy-btn');
    if(copy&&fi) copy.addEventListener('click',function(){ fi.value=contentText; saveAndQueue(id,node); highlight(node); fi.focus(); });
    var mi=node.querySelector('.comment-input,.t-comment-input');
    if(mi) mi.addEventListener('input',function(){ saveAndQueue(id,node); });
    var db=node.querySelector('.done-box');
    if(db) db.addEventListener('change',function(){ saveAndQueue(id,node); highlight(node); updateCount(); });
    var saved=loadRow(id);
    if(saved){
      if(fi) fi.value=saved.fix||'';
      if(mi) mi.value=saved.memo||'';
      if(db) db.checked=!!saved.done;
    }
    highlight(node);
  }

  // ---- 絞り込み（レビュータブ） ----
  function applyFilter(){
    var t=document.getElementById('filter-type').value;
    var todo=document.getElementById('only-todo').checked;
    document.querySelectorAll('#cards .card').forEach(function(c){
      var ok=true;
      if(t&&c.getAttribute('data-type')!==t) ok=false;
      if(todo){ var db=c.querySelector('.done-box'); if(db&&db.checked) ok=false; }
      c.style.display=ok?'':'none';
    });
  }

  // ---- タブ ----
  function switchTab(name){
    document.querySelectorAll('.tab').forEach(function(b){ b.classList.toggle('active',b.getAttribute('data-tab')===name); });
    document.querySelectorAll('.tabsec').forEach(function(s){ s.classList.toggle('active',s.id==='tab-'+name); });
  }

  // ---- CSV出力（記入内容のみ） ----
  function csvEsc(s){ return '"'+String(s==null?'':s).replace(/"/g,'""')+'"'; }
  function exportCsv(){
    var header=['ID','セクション','確認済み','修正後の内容','レビューコメント','記入者'];
    var lines=[header.map(csvEsc).join(',')], editor=getEditor();
    document.querySelectorAll('[data-row-id]').forEach(function(node){
      var sec=node.classList.contains('card')?'回答レビュー':'矛盾';
      var fi=node.querySelector('.fix-input'), mi=node.querySelector('.comment-input,.t-comment-input'), db=node.querySelector('.done-box');
      lines.push([
        node.getAttribute('data-row-id'), sec,
        (db&&db.checked)?'確認済み':'',
        fi?fi.value:'', mi?mi.value:'', editor
      ].map(csvEsc).join(','));
    });
    var csv='﻿'+lines.join('\r\n');
    var a=document.createElement('a'), url=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
    a.href=url; a.download='hf_review_'+new Date().toISOString().slice(0,16).replace(/[-:T]/g,'')+'.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},1000);
  }
  function cssEsc(s){ return String(s).replace(/"/g,'\\"'); }

  // ---- 初期化 ----
  document.getElementById('who').value=localStorage.getItem(EDITOR_NAME_KEY)||'';
  document.querySelectorAll('[data-row-id]').forEach(processNode);
  updateCount();
  document.getElementById('tabbtn-review').textContent='回答内容レビュー ('+document.querySelectorAll('#cards .card').length+')';
  document.getElementById('tabbtn-clash').textContent='項目をまたいだ矛盾 ('+document.querySelectorAll('#clash-table tbody tr[data-row-id]').length+')';
  document.getElementById('btn-fetch').addEventListener('click',fetchServer);
  document.getElementById('btn-csv').addEventListener('click',exportCsv);
  document.getElementById('filter-type').addEventListener('change',applyFilter);
  document.getElementById('only-todo').addEventListener('change',applyFilter);
  document.querySelectorAll('.tab').forEach(function(b){ b.addEventListener('click',function(){ switchTab(b.getAttribute('data-tab')); }); });

  function setToolbarH(){ var tb=document.querySelector('.toolbar'); if(tb) document.documentElement.style.setProperty('--toolbar-h',(tb.offsetHeight+6)+'px'); }
  setToolbarH(); window.addEventListener('resize',setToolbarH);

  if(GAS_WEB_APP_URL) fetchServer(); else setStat('ローカル保存のみ（GAS未設定）');

  setInterval(function(){
    if(!GAS_WEB_APP_URL) return;
    if(pushTimer||Object.keys(pushQueue).length>0) return;
    var ae=document.activeElement;
    if(ae&&(ae.classList.contains('fix-input')||ae.classList.contains('comment-input')||ae.classList.contains('t-comment-input'))) return;
    if(document.hidden) return;
    fetchServer();
  }, POLL_MS);
})();
</script>
</body></html>
