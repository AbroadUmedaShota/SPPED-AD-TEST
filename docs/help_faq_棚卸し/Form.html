<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<base target="_top">
<style>
  :root{
    --blue:#1d4ed8; --ink:#10294d; --ink2:#3f567a; --muted:#90a3c0;
    --line:#e3ebf6; --band:#f3f7fd; --ok:#15803d; --warn:#b45309; --ng:#b91c1c;
    --font:"Noto Sans JP",system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:#f5f8fd;color:var(--ink);font-family:var(--font);line-height:1.6}
  .wrap{max-width:720px;margin:0 auto;padding:16px}
  header{position:sticky;top:0;background:#f5f8fdf2;backdrop-filter:blur(6px);
    padding:12px 16px;border-bottom:1px solid var(--line);z-index:5}
  .hrow{max-width:720px;margin:0 auto;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  h1{font-size:16px;font-weight:800;margin:0;flex:1}
  .who input{font-size:13px;padding:6px 10px;border:1px solid var(--line);border-radius:8px;width:140px}
  .prog{font-size:13px;color:var(--ink2);font-weight:700}
  .bar{height:6px;background:var(--line);border-radius:999px;overflow:hidden;margin-top:8px;max-width:720px;margin-left:auto;margin-right:auto}
  .bar>i{display:block;height:100%;background:var(--blue);width:0}
  .card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px;margin:16px 0;
    box-shadow:0 10px 30px -22px rgba(16,41,77,.4)}
  .meta{display:flex;gap:8px;flex-wrap:wrap;font-size:12px;margin-bottom:10px}
  .tag{background:var(--band);color:var(--ink2);font-weight:700;padding:2px 10px;border-radius:999px}
  .tag.id{background:#eef2ff;color:var(--blue)}
  .lbl{font-size:12px;font-weight:800;color:var(--ink2);margin:14px 0 6px}
  .orig{background:var(--band);border-radius:10px;padding:12px 14px;font-size:14px;white-space:pre-wrap}
  .note{font-size:12px;color:var(--warn);margin-top:8px;white-space:pre-wrap}
  textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;
    font-family:inherit;font-size:14px;min-height:84px;resize:vertical}
  .copy{margin:8px 0 0;display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;
    background:#fff;color:var(--blue);border:1.5px solid #c9d9f2;border-radius:999px;padding:8px 14px;cursor:pointer}
  .copy:hover{background:#eef4fd}
  .judge{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
  .judge label{flex:1;min-width:120px;border:1.5px solid var(--line);border-radius:10px;padding:10px;
    text-align:center;font-weight:700;font-size:13px;cursor:pointer;background:#fff}
  .judge input{display:none}
  .judge label.sel[data-v="○"]{border-color:var(--ok);color:var(--ok);background:#f0fdf4}
  .judge label.sel[data-v="△"]{border-color:var(--warn);color:var(--warn);background:#fffbeb}
  .judge label.sel[data-v="×"]{border-color:var(--ng);color:var(--ng);background:#fef2f2}
  .judge label.sel[data-v="要確認"]{border-color:var(--blue);color:var(--blue);background:#eff6ff}
  input.memo,input.by{width:100%;border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-family:inherit;font-size:14px}
  .actions{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
  .btn{flex:1;min-width:120px;border:none;border-radius:999px;padding:13px;font-weight:800;font-size:14px;cursor:pointer}
  .btn.primary{background:var(--blue);color:#fff;box-shadow:0 8px 18px -10px rgba(29,78,216,.55)}
  .btn.ghost{background:#fff;color:var(--ink2);border:1.5px solid var(--line)}
  .done{font-size:12px;color:var(--ok);font-weight:800;margin-left:auto}
  .msg{text-align:center;padding:40px 16px;color:var(--ink2)}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--ink);color:#fff;
    padding:10px 18px;border-radius:999px;font-size:13px;font-weight:700;opacity:0;transition:opacity .2s;z-index:9}
  .toast.show{opacity:1}
  .filter{font-size:12px;color:var(--ink2);display:inline-flex;align-items:center;gap:6px;cursor:pointer}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <h1>棚卸しレビュー記入</h1>
    <label class="filter"><input type="checkbox" id="onlyTodo"> 未判定のみ</label>
    <span class="who"><input id="who" placeholder="あなたの名前" aria-label="判定者名"></span>
    <span class="prog" id="prog">読込中…</span>
  </div>
  <div class="bar"><i id="barFill"></i></div>
</header>

<div class="wrap">
  <div id="msg" class="msg">データを読み込んでいます…</div>
  <div id="card" style="display:none"></div>
  <div class="actions" id="nav" style="display:none">
    <button class="btn ghost" id="prev">← 戻る</button>
    <button class="btn ghost" id="skip">スキップ</button>
    <button class="btn primary" id="save">保存して次へ →</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var ITEMS = [], VIEW = [], idx = 0;

window.onload = function(){
  document.getElementById('who').value = localStorage.getItem('reviewer') || '';
  document.getElementById('who').addEventListener('change', function(){
    localStorage.setItem('reviewer', this.value.trim());
  });
  document.getElementById('onlyTodo').addEventListener('change', applyFilter);
  document.getElementById('prev').onclick = function(){ go(idx-1); };
  document.getElementById('skip').onclick = function(){ go(idx+1); };
  document.getElementById('save').onclick = save;
  google.script.run.withSuccessHandler(onItems).withFailureHandler(onErr).getReviewItems();
};

function onItems(res){
  if(res.error){ document.getElementById('msg').textContent = res.error; return; }
  ITEMS = res.items || [];
  if(!ITEMS.length){ document.getElementById('msg').textContent = '項目がありません。先に「今すぐ同期」を実行してください。'; return; }
  applyFilter();
}
function onErr(e){ document.getElementById('msg').textContent = 'エラー: ' + (e && e.message ? e.message : e); }

function applyFilter(){
  var only = document.getElementById('onlyTodo').checked;
  VIEW = only ? ITEMS.filter(function(it){ return !it.match; }) : ITEMS.slice();
  if(!VIEW.length){ showMsg('未判定の項目はありません 🎉'); return; }
  idx = 0; render();
}
function showMsg(t){
  document.getElementById('msg').style.display='block';
  document.getElementById('msg').textContent=t;
  document.getElementById('card').style.display='none';
  document.getElementById('nav').style.display='none';
}

function render(){
  if(idx<0) idx=0;
  if(idx>=VIEW.length){ showMsg('このリストは最後まで記入しました 🎉'); return; }
  var it = VIEW[idx];
  document.getElementById('msg').style.display='none';
  var card = document.getElementById('card');
  card.style.display='block';
  document.getElementById('nav').style.display='flex';
  document.getElementById('prog').textContent = (idx+1)+' / '+VIEW.length;
  document.getElementById('barFill').style.width = ((idx+1)/VIEW.length*100)+'%';

  var done = it.match ? '<span class="done">記入済み: '+esc(it.match)+'</span>' : '';
  card.innerHTML =
    '<div class="meta"><span class="tag id">'+esc(it.id)+'</span>'+
      '<span class="tag">'+esc(it.src||'')+'</span>'+
      '<span class="tag">'+esc(it.kind||'')+'</span>'+done+'</div>'+
    '<div class="lbl">元の記載（コンテンツの主張）</div>'+
    '<div class="orig">'+esc(it.claim||'')+'</div>'+
    (it.note ? '<div class="note">⚠ '+esc(it.note)+'</div>' : '')+
    (it.ref ? '<div class="lbl">照合先候補</div><div class="orig">'+esc(it.ref)+'</div>' : '')+
    '<div class="lbl">確認後の内容（正しい値）</div>'+
    '<textarea id="val" placeholder="正しければ下のボタンで原文をコピー。違う場合はここに正しい内容を入力">'+esc(it.val||'')+'</textarea>'+
    '<button type="button" class="copy" id="copyBtn">✓ 原文のままでOK（コピーして○）</button>'+
    '<div class="lbl">判定</div>'+
    '<div class="judge" id="judge">'+
      jbtn('○','正しい')+jbtn('△','一部')+jbtn('×','誤り')+jbtn('要確認','要確認')+
    '</div>'+
    '<div class="lbl">判定メモ（任意）</div>'+
    '<input class="memo" id="memo" value="'+esc(it.memo||'')+'" placeholder="根拠・補足">';

  // 判定の初期選択
  setJudge(it.match || '');
  document.querySelectorAll('#judge label').forEach(function(l){
    l.onclick = function(){ setJudge(l.getAttribute('data-v')); };
  });
  document.getElementById('copyBtn').onclick = function(){
    document.getElementById('val').value = it.claim || '';
    setJudge('○');
  };
}

function jbtn(v,label){
  return '<label data-v="'+v+'"><input type="radio" name="judge" value="'+v+'">'+v+' '+label+'</label>';
}
function setJudge(v){
  document.querySelectorAll('#judge label').forEach(function(l){
    var on = l.getAttribute('data-v')===v;
    l.classList.toggle('sel', on);
    var r=l.querySelector('input'); if(r) r.checked=on;
  });
}
function curJudge(){
  var r = document.querySelector('#judge input:checked');
  return r ? r.value : '';
}

function save(){
  var it = VIEW[idx];
  var who = document.getElementById('who').value.trim();
  var payload = {
    id: it.id,
    val: document.getElementById('val').value,
    match: curJudge(),
    memo: document.getElementById('memo').value,
    by: who
  };
  if(!payload.match){ toast('判定（○△×）を選んでください'); return; }
  var btn = document.getElementById('save'); btn.disabled=true; btn.textContent='保存中…';
  google.script.run.withSuccessHandler(function(res){
    btn.disabled=false; btn.textContent='保存して次へ →';
    if(res && res.ok){
      // ローカルにも反映
      it.match=payload.match; it.val=payload.val; it.memo=payload.memo; it.by=payload.by;
      var orig = ITEMS.filter(function(x){return x.id===it.id;})[0];
      if(orig){ orig.match=it.match; orig.val=it.val; orig.memo=it.memo; orig.by=it.by; }
      toast('保存しました'); go(idx+1);
    } else { toast('保存失敗: '+(res&&res.error||'')); }
  }).withFailureHandler(function(e){
    btn.disabled=false; btn.textContent='保存して次へ →'; toast('通信エラー: '+(e&&e.message||e));
  }).saveReviewJudgment(payload);
}
function go(i){ idx=i; render(); window.scrollTo(0,0); }

var toastT;
function toast(t){
  var el=document.getElementById('toast'); el.textContent=t; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(function(){ el.classList.remove('show'); },2200);
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
</script>
</body>
</html>
