<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>お知らせ｜SPEED-AD Support (Compact)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/news.css">
<style>
  /* === Variant B: Compact Newspaper === */
  .b-hero {
    padding: 56px 0 28px;
    border-bottom: 1px solid var(--ink);
  }
  .b-hero__eyebrow {
    font-size: 11.5px; letter-spacing: 0.18em; color: var(--brand);
    font-weight: 600; text-transform: uppercase; margin-bottom: 10px;
  }
  .b-hero__row {
    display: flex; align-items: baseline; justify-content: space-between; gap: 32px;
  }
  .b-hero__title {
    font-size: 40px; font-weight: 700; line-height: 1.2; margin: 0; letter-spacing: -0.01em;
  }
  .b-hero__count {
    font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums;
  }
  .b-hero__count strong { color: var(--ink); font-weight: 600; }

  .b-toolbar {
    display: flex; gap: 8px; align-items: center;
    padding: 18px 0; border-bottom: 1px solid var(--line);
    overflow-x: auto;
  }
  .b-chip {
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: #fff;
    color: var(--ink-2);
    cursor: pointer;
    white-space: nowrap;
  }
  .b-chip.is-active {
    background: var(--ink);
    color: #fff;
    border-color: var(--ink);
  }
  .b-chip:not(.is-active):hover { border-color: var(--brand); color: var(--brand-ink); }

  .b-list { padding: 0 0 80px; }
  .b-row {
    display: grid;
    grid-template-columns: 120px 110px 1fr 32px;
    gap: 24px;
    padding: 22px 0;
    border-bottom: 1px solid var(--line);
    text-decoration: none;
    color: inherit;
    align-items: baseline;
    transition: background .15s ease;
  }
  .b-row:hover { background: var(--brand-softer); }
  .b-row__date {
    font-size: 13.5px;
    color: var(--ink-2);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
  }
  .b-row__date .dow {
    color: var(--muted-2);
    font-size: 11px;
    margin-left: 6px;
    letter-spacing: 0.1em;
  }
  .b-row__tags { padding: 0; }
  .b-row__body { min-width: 0; }
  .b-row__title {
    font-size: 15px;
    font-weight: 600;
    margin: 0 0 4px;
    color: var(--ink);
    line-height: 1.55;
  }
  .b-row__summary {
    font-size: 12.5px;
    color: var(--muted);
    margin: 0;
    line-height: 1.65;
  }
  .b-row__arrow {
    color: var(--muted-2);
    text-align: right;
    transition: color .15s ease, transform .15s ease;
  }
  .b-row:hover .b-row__title { color: var(--brand-ink); }
  .b-row:hover .b-row__arrow { color: var(--brand); transform: translateX(3px); }

  .b-year-rule {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 32px 0 14px;
    font-size: 12px;
    letter-spacing: 0.18em;
    color: var(--muted-2);
    text-transform: uppercase;
  }
  .b-year-rule::before, .b-year-rule::after {
    content: ""; flex: 1; height: 1px; background: var(--line);
  }
</style>
</head>
<body data-screen-label="News List — Compact">

<header class="support-header">
  <a class="support-header__brand" href="../../index.html">
    <svg width="22" height="22" viewBox="0 0 24 24" aria-hidden="true">
      <path fill="#111827" d="M12 2 L22 20 H2 Z"/>
    </svg>
    <span>SPEED-AD Support</span>
  </a>
  <nav class="support-header__nav" aria-label="サポートナビ">
    <a href="#">ヘルプ</a>
    <a href="#">FAQ</a>
    <a href="#" class="is-active">お知らせ</a>
    <a href="#">お問い合わせ</a>
  </nav>
</header>

<div class="tint-band">
  <nav class="breadcrumb" aria-label="パンくず">
    <a href="#">ヘルプセンター</a>
    <span class="breadcrumb__sep">/</span>
    <span class="breadcrumb__current">お知らせ</span>
  </nav>
</div>

<main class="page">

  <section class="b-hero">
    <div class="b-hero__eyebrow">News &amp; Updates</div>
    <div class="b-hero__row">
      <h1 class="b-hero__title">お知らせ</h1>
      <div class="b-hero__count"><strong id="b-count">—</strong> 件 / 最終更新 <span id="b-updated">—</span></div>
    </div>
  </section>

  <div class="b-toolbar" id="b-filters" role="tablist" aria-label="カテゴリ"></div>

  <section class="b-list" aria-live="polite">
    <div id="b-body"></div>
  </section>

</main>

<footer class="support-footer">© 2026 SPEED-AD. All rights reserved.</footer>

<script>
const DATA_URL = "../assets/data/news.json";
const DOW_EN = ["SUN","MON","TUE","WED","THU","FRI","SAT"];

function esc(s){ return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c])); }
function pad(n){ return String(n).padStart(2,"0"); }
function parseDate(s){ const [y,m,d]=s.split("-").map(Number); return new Date(y, m-1, d); }
function isValidRel(u){ return typeof u === "string" && /^05_support\/news\/[\w\-]+\/$/.test(u); }
function detailHref(u){ return u.replace(/^05_support\/news\//, ""); }
function tagsHtml(item){
  const t = (item.tags && item.tags.length) ? item.tags.slice(0,1) : (item.category ? [item.category] : []);
  return t.map(x => `<span class="tag">${esc(x)}</span>`).join("");
}

let ALL = [];
let activeCat = "All";

function renderRows(items){
  let html = "";
  let lastYear = null;
  for(const it of items){
    if(!isValidRel(it.url)) continue;
    const d = parseDate(it.date);
    if(d.getFullYear() !== lastYear){
      html += `<div class="b-year-rule">${d.getFullYear()}</div>`;
      lastYear = d.getFullYear();
    }
    html += `
      <a class="b-row" href="${esc(detailHref(it.url))}">
        <div class="b-row__date">${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())}<span class="dow">${DOW_EN[d.getDay()]}</span></div>
        <div class="b-row__tags">${tagsHtml(it)}</div>
        <div class="b-row__body">
          <h3 class="b-row__title">${esc(it.title)}</h3>
          <p class="b-row__summary">${esc(it.summary)}</p>
        </div>
        <div class="b-row__arrow" aria-hidden="true">→</div>
      </a>`;
  }
  return html;
}

function renderFilters(items){
  const cats = ["All", ...new Set(items.map(it => (it.tags && it.tags[0]) || it.category).filter(Boolean))];
  return cats.map(c => `<button class="b-chip ${c===activeCat?'is-active':''}" data-cat="${esc(c)}">${esc(c)}</button>`).join("");
}

function render(){
  const filtered = activeCat === "All" ? ALL : ALL.filter(it => ((it.tags && it.tags[0]) || it.category) === activeCat);
  document.getElementById("b-body").innerHTML = renderRows(filtered) || `<div class="news-state">該当するお知らせはありません。</div>`;
}

async function load(){
  let data;
  try {
    const r = await fetch(DATA_URL, { cache: "no-cache" });
    if(!r.ok) throw new Error();
    data = await r.json();
  } catch(e){
    document.getElementById("b-body").innerHTML = `<div class="news-state">読み込みに失敗しました。</div>`;
    return;
  }
  ALL = (data.items || []).slice().sort((a,b)=> b.date.localeCompare(a.date));
  document.getElementById("b-count").textContent = ALL.length;
  document.getElementById("b-updated").textContent = (data.updatedAt||"").replace(/-/g,".");
  document.getElementById("b-filters").innerHTML = renderFilters(ALL);
  document.getElementById("b-filters").addEventListener("click", e => {
    const btn = e.target.closest("[data-cat]");
    if(!btn) return;
    activeCat = btn.dataset.cat;
    document.getElementById("b-filters").innerHTML = renderFilters(ALL);
    render();
  });
  render();
}
load();
</script>
</body>
</html>
