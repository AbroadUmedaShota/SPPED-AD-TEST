<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SPEEDAD Premium — Features セクション 表示3案</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Outlined">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="sections.css">
<style>
  body{margin:0;background:#eef1f5;font-family:'Noto Sans JP',sans-serif}
  .v2-wrap{padding:24px}
  .v2-stage{max-width: 1280px; margin: 0 auto 56px}
  .v2-note{
    margin: 0 0 12px;
    font-family: 'Inter',sans-serif; font-size:11px; font-weight:700;
    letter-spacing:.14em; color:#64748b; text-transform:uppercase;
    display:flex; align-items:center; gap:12px;
  }
  .v2-note .num{
    width:22px; height:22px; border-radius:50%;
    background:#0f172a; color:#fff;
    display:inline-flex; align-items:center; justify-content:center;
    font-size:11px; font-family:'Inter',sans-serif;
  }
  .v2-note .ja{color:#334155; font-family:'Noto Sans JP',sans-serif; letter-spacing:0; font-weight:600; font-size:13px; text-transform:none}

  /* ===== Variant A: 番号付き罫線リスト ===== */
  .featA{
    background:#fff; border:1px solid var(--slate-200);
    border-radius: var(--r-2xl); padding: 36px 40px;
  }
  .featA .s-head{margin-bottom: 28px}
  .featA .s-head .label{font-family: var(--font-en); font-size:11px; font-weight:700; letter-spacing:.14em; color: var(--blue-700); text-transform:uppercase}
  .featA .s-head h2{font-size:26px; font-weight:800; letter-spacing:-.01em; margin: 8px 0 8px; color: var(--slate-950)}
  .featA .s-head .sub{color: var(--slate-600); font-size:14px}

  .featA-list{
    display:grid;
    grid-template-columns: 1fr 1fr;
    column-gap: 48px;
  }
  .featA-row{
    display:grid;
    grid-template-columns: 38px 1fr;
    gap: 16px;
    padding: 18px 0;
    border-top:1px solid var(--slate-200);
    align-items:start;
  }
  .featA-row:nth-last-child(-n+2){border-bottom:1px solid var(--slate-200)}
  .featA-row .num{
    font-family: var(--font-en);
    font-size:12px; font-weight:700; color: var(--blue-700);
    letter-spacing:.08em;
    padding-top: 4px;
  }
  .featA-row .body .top{
    display:flex; align-items:center; gap:10px; margin-bottom:6px;
  }
  .featA-row .body .top .icon{font-size:18px; color: var(--slate-500)}
  .featA-row .body .top .t{font-size:15px; font-weight:700; color: var(--slate-950)}
  .featA-row .body .top .tag{
    margin-left:auto;
    font-family: var(--font-en); font-size:10px; font-weight:700;
    letter-spacing:.08em; color: var(--slate-500);
    padding: 2px 7px; border-radius:4px; background: var(--slate-100);
  }
  .featA-row .body .d{
    font-size:13px; color: var(--slate-600); line-height:1.7;
  }

  /* ===== Variant B: テーブル風 3カラム ===== */
  .featB{
    background:#fff; border:1px solid var(--slate-200);
    border-radius: var(--r-2xl); padding: 36px 40px;
  }
  .featB .s-head{margin-bottom: 24px}
  .featB .s-head .label{font-family: var(--font-en); font-size:11px; font-weight:700; letter-spacing:.14em; color: var(--blue-700); text-transform:uppercase}
  .featB .s-head h2{font-size:26px; font-weight:800; letter-spacing:-.01em; margin: 8px 0 8px; color: var(--slate-950)}
  .featB .s-head .sub{color: var(--slate-600); font-size:14px}

  .featB-table{border-top:1px solid var(--slate-200)}
  .featB-head{
    display:grid; grid-template-columns: 220px 1fr 180px;
    padding: 12px 0;
    border-bottom:1px solid var(--slate-200);
    font-family: var(--font-en);
    font-size:10.5px; font-weight:700; letter-spacing:.14em;
    text-transform:uppercase; color: var(--slate-500);
  }
  .featB-row{
    display:grid; grid-template-columns: 220px 1fr 180px;
    padding: 18px 0;
    border-bottom:1px solid var(--slate-200);
    align-items:start;
  }
  .featB-row .col-name{
    display:flex; align-items:center; gap:12px;
  }
  .featB-row .col-name .ic{
    width:32px; height:32px; border-radius:8px;
    background: var(--blue-50); color: var(--blue-700);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .featB-row .col-name .ic .icon{font-size:18px}
  .featB-row .col-name .t{font-size:14px; font-weight:700; color: var(--slate-950)}
  .featB-row .col-desc{font-size:13px; color: var(--slate-600); line-height:1.7; padding-right: 24px}
  .featB-row .col-spec{
    font-family: var(--font-en);
    font-size:11.5px; font-weight:600;
    color: var(--slate-700);
    letter-spacing:.04em;
  }
  .featB-row .col-spec .tag{
    display:inline-block;
    padding: 3px 8px; border-radius:4px;
    background: var(--slate-100); color: var(--slate-700);
    margin-right:6px; margin-bottom:4px;
    font-size:10.5px; letter-spacing:.06em; font-weight:700;
  }

  /* ===== Variant C: 横タブ + UIモックプレビュー（揉み直し） ===== */
  .featC{
    background:#fff; border:1px solid var(--slate-200);
    border-radius: var(--r-2xl); padding: 36px 40px;
  }
  .featC .s-head{margin-bottom: 24px; display:flex; align-items:flex-end; justify-content:space-between; gap:24px}
  .featC .s-head .label{font-family: var(--font-en); font-size:11px; font-weight:700; letter-spacing:.14em; color: var(--blue-700); text-transform:uppercase}
  .featC .s-head h2{font-size:26px; font-weight:800; letter-spacing:-.01em; margin: 8px 0 8px; color: var(--slate-950)}
  .featC .s-head .sub{color: var(--slate-600); font-size:14px; max-width:560px}
  .featC .s-head .counter{
    font-family: var(--font-en); font-size:11px; font-weight:700;
    letter-spacing:.14em; color: var(--slate-400); text-transform:uppercase;
    white-space:nowrap;
  }
  .featC .s-head .counter .cur{color: var(--slate-950); font-size:14px}

  /* horizontal tab bar */
  .featC-tabbar{
    display:grid; grid-template-columns: repeat(6, 1fr);
    gap: 0;
    border:1px solid var(--slate-200);
    border-radius: 12px;
    background: #f8fafc;
    padding: 4px;
    margin-bottom: 20px;
    position:relative;
  }
  .featC-tab{
    display:flex; align-items:center; gap:10px;
    padding: 12px 14px;
    border-radius: 8px;
    cursor:pointer;
    background: transparent;
    transition: background .15s ease, color .15s ease;
    min-width: 0;
  }
  .featC-tab:hover{background: rgba(255,255,255,.6)}
  .featC-tab.active{
    background:#fff;
    box-shadow: 0 1px 2px rgba(15,23,42,.06), 0 1px 3px rgba(15,23,42,.08);
  }
  .featC-tab .ic{
    width:28px; height:28px; border-radius:7px;
    background: var(--slate-100); color: var(--slate-500);
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
    transition: background .15s ease, color .15s ease;
  }
  .featC-tab.active .ic{background: var(--blue-50); color: var(--blue-700)}
  .featC-tab .ic .icon{font-size:16px}
  .featC-tab .t{
    font-size:12.5px; font-weight:600; color: var(--slate-600);
    line-height:1.35;
    overflow:hidden; text-overflow: ellipsis; white-space: nowrap;
    min-width: 0;
  }
  .featC-tab.active .t{color: var(--slate-950); font-weight:700}

  /* main panel: 2 columns — left text, right visual */
  .featC-panel{
    background:#ffffff;
    border:1px solid var(--slate-200);
    border-radius: 14px;
    padding: 0;
    min-height: 420px;
    display:grid;
    grid-template-columns: 1fr 1.05fr;
    overflow:hidden;
    animation: featC-fade .35s ease;
  }
  @keyframes featC-fade{
    from{opacity:0; transform: translateY(4px)}
    to{opacity:1; transform: translateY(0)}
  }
  .featC-panel .left{
    padding: 36px 36px 32px;
    display:flex; flex-direction:column;
  }
  .featC-panel .ptag{
    display:inline-flex; align-items:center; gap:8px;
    font-family: var(--font-en); font-size:10.5px; font-weight:700;
    letter-spacing:.14em; color: var(--blue-700); text-transform:uppercase;
    margin-bottom: 10px;
  }
  .featC-panel .ptag .num{
    font-family: var(--font-en);
    background: var(--blue-50); color: var(--blue-700);
    padding: 3px 8px; border-radius:4px;
    font-size:10px;
  }
  .featC-panel h3{
    font-size:24px; font-weight:800; letter-spacing:-.01em; color: var(--slate-950);
    margin: 0 0 14px; line-height:1.4;
  }
  .featC-panel .pdesc{
    font-size:14px; color: var(--slate-700); line-height:1.85;
    margin-bottom: 18px;
  }
  .featC-panel .scenario{
    display:flex; gap:12px;
    padding: 14px 16px;
    background: var(--blue-50);
    border-left: 3px solid var(--blue-700);
    border-radius: 6px;
    margin-bottom: 22px;
  }
  .featC-panel .scenario .ic{
    color: var(--blue-700); flex-shrink:0; padding-top:1px;
  }
  .featC-panel .scenario .ic .icon{font-size:18px}
  .featC-panel .scenario .body .lbl{
    font-family: var(--font-en); font-size:10px; font-weight:700;
    letter-spacing:.12em; color: var(--blue-700); text-transform:uppercase;
    margin-bottom: 3px;
  }
  .featC-panel .scenario .body .txt{
    font-size:13px; color: var(--slate-800); line-height:1.65;
  }
  .featC-panel .specs{
    margin-top:auto;
    display:grid; grid-template-columns: 1fr 1fr; gap: 14px 24px;
    padding-top: 18px;
    border-top: 1px solid var(--slate-200);
  }
  .featC-panel .specs .k{
    font-family: var(--font-en); font-size:10.5px; font-weight:700;
    letter-spacing:.12em; color: var(--slate-500); text-transform:uppercase;
    margin-bottom: 4px;
  }
  .featC-panel .specs .v{font-size:13.5px; color: var(--slate-950); font-weight:600}

  /* Right: visual mock area */
  .featC-panel .right{
    background: linear-gradient(180deg, #f1f5f9 0%, #e8eef5 100%);
    border-left: 1px solid var(--slate-200);
    padding: 28px;
    position:relative;
    overflow:hidden;
    display:flex; align-items:center; justify-content:center;
  }
  .featC-panel .right::before{
    content:""; position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(15,23,42,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(15,23,42,.04) 1px, transparent 1px);
    background-size: 24px 24px;
    pointer-events:none;
  }
  .featC-mock{
    position:relative; z-index:1;
    background:#fff; border:1px solid var(--slate-200);
    border-radius: 10px;
    box-shadow: 0 12px 32px rgba(15,23,42,.08), 0 4px 8px rgba(15,23,42,.04);
    width: 100%;
    max-width: 380px;
    overflow:hidden;
  }
  .featC-mock-bar{
    display:flex; align-items:center; gap:6px;
    padding: 8px 12px;
    border-bottom:1px solid var(--slate-200);
    background:#fafbfc;
  }
  .featC-mock-bar .dot{width:8px; height:8px; border-radius:50%; background: var(--slate-300)}
  .featC-mock-bar .dot:nth-child(2){background:#fbbf24}
  .featC-mock-bar .dot:nth-child(3){background:#10b981}
  .featC-mock-bar .ttl{
    margin-left:8px; font-family: var(--font-en); font-size:10.5px; font-weight:600;
    color: var(--slate-500); letter-spacing:.04em;
  }
  .featC-mock-body{padding: 16px}

  /* Specific mock styles */
  .mock-storage .row{display:flex; justify-content:space-between; align-items:center; padding: 10px 12px; border:1px solid var(--slate-200); border-radius:6px; margin-bottom:8px; font-size:12px}
  .mock-storage .row .name{color: var(--slate-700); font-weight:500}
  .mock-storage .row .date{color: var(--slate-500); font-family: var(--font-en); font-size:11px}
  .mock-storage .row .badge{font-family: var(--font-en); font-size:9.5px; font-weight:700; padding:2px 6px; border-radius:3px; background: var(--blue-50); color: var(--blue-700); letter-spacing:.04em; margin-left:auto; margin-right:10px}
  .mock-storage .meter{height:6px; border-radius:3px; background: var(--slate-100); overflow:hidden; margin-top:12px}
  .mock-storage .meter > i{display:block; height:100%; background: var(--blue-700); border-radius:3px}
  .mock-storage .meter-lbl{display:flex; justify-content:space-between; font-size:10.5px; color: var(--slate-500); margin-top:6px; font-family: var(--font-en)}

  .mock-form .q{padding: 10px 12px; border:1px solid var(--slate-200); border-radius:6px; margin-bottom:8px; font-size:12px}
  .mock-form .q .qlbl{font-size:10.5px; color: var(--slate-500); margin-bottom:4px; font-family: var(--font-en); font-weight:600; letter-spacing:.06em}
  .mock-form .q.branch{background: var(--blue-50); border-color: var(--blue-100); color: var(--slate-800)}
  .mock-form .q.branch .qlbl{color: var(--blue-700)}
  .mock-form .q .opt{display:flex; align-items:center; gap:6px; color: var(--slate-700)}
  .mock-form .q .radio{width:12px; height:12px; border-radius:50%; border:2px solid var(--slate-300); flex-shrink:0}
  .mock-form .q .radio.on{border-color: var(--blue-700); background: var(--blue-700); box-shadow: inset 0 0 0 2px #fff}
  .mock-form .arrow{text-align:center; color: var(--slate-400); margin: 4px 0; font-family: var(--font-en); font-size:10px}

  .mock-excel{font-family: var(--font-en); font-size:10.5px}
  .mock-excel .head{display:grid; grid-template-columns: 32px 1fr 1fr 70px; background: #f1f5f9; padding: 6px 8px; font-weight:700; color: var(--slate-600); border-bottom:1px solid var(--slate-200)}
  .mock-excel .row{display:grid; grid-template-columns: 32px 1fr 1fr 70px; padding: 7px 8px; border-bottom:1px solid var(--slate-100); color: var(--slate-700)}
  .mock-excel .row .num{color: var(--slate-400)}
  .mock-excel .row.alt{background: #fafcff}
  .mock-excel .toolbar{display:flex; gap:6px; padding:8px; background: #fafbfc; border-bottom:1px solid var(--slate-200); font-size:10px}
  .mock-excel .tb-btn{padding: 4px 8px; background:#fff; border:1px solid var(--slate-200); border-radius:4px; color: var(--slate-600); font-weight:600}
  .mock-excel .tb-btn.primary{background: var(--blue-700); color:#fff; border-color: var(--blue-700)}

  .mock-review{display:grid; grid-template-columns: 1fr 1fr; gap:10px}
  .mock-review .pane{border:1px solid var(--slate-200); border-radius:6px; overflow:hidden}
  .mock-review .pane .ph{padding:6px 8px; font-size:10px; color: var(--slate-500); background: #f1f5f9; font-family: var(--font-en); font-weight:700; letter-spacing:.06em; border-bottom:1px solid var(--slate-200)}
  .mock-review .pane.img .body{aspect-ratio: 1.6; background: linear-gradient(135deg, #fef3c7, #fde68a); display:flex; align-items:center; justify-content:center; color: var(--amber-700); font-family: var(--font-en); font-size:10px; font-weight:700; letter-spacing:.06em}
  .mock-review .pane.data .body{padding: 10px; font-size:11px}
  .mock-review .pane.data .row{display:flex; justify-content:space-between; padding: 4px 0; border-bottom:1px solid var(--slate-100); color: var(--slate-700)}
  .mock-review .pane.data .row .k{color: var(--slate-500); font-size:10px}
  .mock-review .pane.data .row .v{font-weight:600}
  .mock-review .pane.data .row.edited{background: #fef9c3; margin: 0 -10px; padding: 4px 10px}
  .mock-review .pane.data .row.edited .v{color: var(--amber-700)}
  .mock-review .ftnote{grid-column:1/-1; font-size:10px; color: var(--slate-500); text-align:center; font-family: var(--font-en); margin-top:4px}

  .mock-mail{font-size:11px}
  .mock-mail .head{padding: 10px 12px; border:1px solid var(--slate-200); border-radius:6px; margin-bottom:8px}
  .mock-mail .head .row{display:flex; justify-content:space-between; padding: 3px 0; font-size:10.5px}
  .mock-mail .head .row .k{color: var(--slate-500); font-family: var(--font-en); font-weight:600; letter-spacing:.06em; text-transform:uppercase; font-size:9.5px}
  .mock-mail .head .row .v{color: var(--slate-800); font-weight:600}
  .mock-mail .head .domain{color: var(--blue-700)}
  .mock-mail .body{padding: 12px; border:1px solid var(--slate-200); border-radius:6px; color: var(--slate-700); line-height:1.7; font-size:11px; background: #fafbfc}
  .mock-mail .body .greet{margin-bottom:6px}
  .mock-mail .body .sig{margin-top: 8px; padding-top:8px; border-top: 1px solid var(--slate-200); color: var(--slate-500); font-size:10px}

  .mock-lang{}
  .mock-lang .switcher{display:flex; gap:4px; margin-bottom:10px; padding:4px; background: var(--slate-50); border-radius:6px; border:1px solid var(--slate-200)}
  .mock-lang .switcher .l{flex:1; padding: 5px 8px; border-radius:4px; font-family: var(--font-en); font-size:10.5px; font-weight:700; text-align:center; color: var(--slate-500); cursor:default; letter-spacing:.04em}
  .mock-lang .switcher .l.on{background:#fff; color: var(--slate-950); box-shadow: 0 1px 2px rgba(15,23,42,.08)}
  .mock-lang .form-row{padding: 8px 10px; border:1px solid var(--slate-200); border-radius:6px; margin-bottom: 6px; font-size:11px}
  .mock-lang .form-row .lbl{font-size:10px; color: var(--slate-500); margin-bottom:3px; font-family: var(--font-en); font-weight:600}
  .mock-lang .form-row .val{color: var(--slate-800); font-weight:500}
  .mock-lang .form-row.cn .val{font-family:'Noto Sans JP',sans-serif}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState } = React;

const FEATURES = [
  {
    icon:'inventory_2',
    t:'最長1年データ保存',
    d:'短期確認で終わらせず、後続施策まで継続活用できます。',
    spec:'365 DAYS',
    short:'最長1年保存',
    panelDesc:'契約期間中、回答データを最長1年間保管します。展示会後の確認だけでなく、四半期レビューや翌年の同イベント比較にも活用可能です。',
    scenario:'展示会の半年後、営業から「あの会社の名刺もう一度見たい」と言われても即引き当て。',
    mock:'storage',
    specs:[
      { k:'保存期間', v:'最長 365 日' },
      { k:'対象データ', v:'回答 / 名刺 / 添付' },
      { k:'エクスポート', v:'いつでも可能' },
      { k:'契約終了後', v:'最大30日間保持' },
    ]
  },
  {
    icon:'gesture',
    t:'設問分岐・画像・手書き',
    d:'設問分岐、画像アップロード、手書き入力に対応します。',
    spec:'ADVANCED',
    short:'高度な入力',
    panelDesc:'回答内容に応じた条件分岐、画像アップロード、タブレットでの手書き入力など、展示会ブースでの実運用に必要な高度な入力に対応します。',
    scenario:'「業種で分岐させて、製造業だけ追加質問」をフォーム1つで完結。タブレット手書きにも対応。',
    mock:'form',
    specs:[
      { k:'設問分岐', v:'最大 5 階層' },
      { k:'画像形式', v:'JPG / PNG / HEIC' },
      { k:'手書き', v:'タブレット対応' },
      { k:'必須/任意', v:'設問単位で設定' },
    ]
  },
  {
    icon:'monitoring',
    t:'Excel / CSV 出力',
    d:'集計・共有・レポート作成に使いやすい形式で出力できます。',
