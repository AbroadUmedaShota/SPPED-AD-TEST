<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>SPEED AD - よくある質問</title>
  <link rel="icon" href="../assets/img/speedad_logo.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/service-top-style.css">
  <link rel="stylesheet" href="../assets/css/help-center.css?v=20260519-hero-label">
  <link rel="stylesheet" href="../assets/css/faq.css?v=20260526-github-pages-faq-path">
  <link rel="stylesheet" href="../assets/css/support-shell.css?v=20260526-github-pages-faq-path">
  <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
  <link as="style" href="https://fonts.googleapis.com/css2?display=swap&family=Inter%3Awght%40400%3B500%3B700%3B900&family=Noto+Sans+JP%3Awght%40400%3B500%3B700%3B900" onload="this.rel='stylesheet'" rel="stylesheet">
</head>
<body data-page-id="faq" data-support-section="faq">
<div class="support-shell">
  <div id="support-header-placeholder"></div>

  <main class="support-main" id="main-content" aria-label="よくある質問">
    <div class="hc-breadcrumb-top">
      <nav aria-label="Breadcrumb"><ol><li><a href="../help/">ヘルプセンター</a></li><li><span class="material-icons" aria-hidden="true">chevron_right</span></li><li><span>よくある質問</span></li></ol></nav>
    </div>

    <div class="faq-main">
      <div id="loading-indicator" class="text-center py-10 hidden" role="status" aria-live="polite">
        <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-primary border-t-transparent"></div>
        <p class="mt-4 text-on-surface-variant">読み込み中...</p>
      </div>
      <div id="error-message" class="hidden my-8" role="alert" aria-live="assertive"></div>
      <div id="faq-container" class="hidden pb-8">
        <section id="category-cards-section" class="pt-4 pb-8" aria-labelledby="category-cards-title">
          <div class="hc-section-heading">
            <h2 id="category-cards-title" class="hc-section-heading__title">カテゴリから探す</h2>
            <p class="hc-section-heading__subtitle">気になるトピックから、代表的な質問をプレビューできます</p>
          </div>
          <div id="category-cards" class="hc-category-grid"></div>
        </section>
        <div id="search-status" class="pt-2 hidden" aria-live="polite" aria-atomic="true"></div>
        <section id="faq-list-section" class="pt-8 pb-8 border-t border-outline-variant" aria-labelledby="faq-list-title">
          <div class="hc-section-heading">
            <h2 id="faq-list-title" class="hc-section-heading__title">すべての質問</h2>
            <p class="hc-section-heading__subtitle">カテゴリごとに展開してご覧いただけます</p>
          </div>
          <div id="faq-list" class="space-y-10"></div>
          <div id="no-results-message" class="text-center py-12 hidden">
            <span class="material-icons text-5xl text-on-surface-variant mb-3" aria-hidden="true">search_off</span>
            <p class="font-bold text-on-background">ご指定のキーワードに一致する質問は見つかりませんでした。</p>
            <p class="text-sm text-on-surface-variant mt-1">別のキーワードをお試しいただくか、下の導線からサポートまでお気軽にお問い合わせください。</p>
            <div class="mt-4 flex flex-wrap justify-center gap-3">
              <button type="button" id="reset-search-btn" class="hc-cta__btn hc-cta__btn--ghost"><span class="material-icons" aria-hidden="true">refresh</span>検索をクリアしてすべて表示</button>
              <a href="../bug-report/" class="hc-cta__btn hc-cta__btn--primary"><span class="material-icons" aria-hidden="true">mail</span>サポートに問い合わせる</a>
            </div>
          </div>
        </section>
        <section class="faq-cta-wrap" aria-labelledby="faq-cta-title">
          <div class="hc-cta">
            <div class="hc-cta__text">
              <h2 id="faq-cta-title" class="hc-cta__title">解決しませんでしたか？</h2>
              <p class="hc-cta__subtitle">ヘルプセンターの記事やサポートチームがお手伝いします。</p>
            </div>
            <div class="hc-cta__actions">
              <a href="../help/" class="hc-cta__btn hc-cta__btn--ghost"><span class="material-icons" aria-hidden="true">menu_book</span>ヘルプセンターを見る</a>
              <a href="../bug-report/" class="hc-cta__btn hc-cta__btn--primary"><span class="material-icons" aria-hidden="true">mail</span>お問い合わせ</a>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <div id="support-footer-placeholder"></div>
</div>
<script type="module" src="../assets/js/support-shell.js?v=20260526-github-pages-faq-path"></script>
<script type="module" src="../assets/js/faq.js?v=20260526-github-pages-faq-path"></script>
</body>
</html>
