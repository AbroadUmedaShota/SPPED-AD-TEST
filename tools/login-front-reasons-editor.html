<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>選ばれる理由 複製エディタ | SPEED AD</title>
  <link rel="stylesheet" href="../css/login-front-reasons-editor.css">
</head>
<body>
  <header class="editor-header">
    <div class="editor-header__title">
      <p class="editor-header__eyebrow">LOGIN FRONT MOCK EDITOR</p>
      <h1>選ばれる理由 複製エディタ</h1>
      <p>本番トップは書き換えず、複製プレビュー上で文言案を調整します。</p>
    </div>
    <div class="editor-toolbar" aria-label="編集ツール">
      <button type="button" class="editor-button editor-button--primary" id="editor-toggle" disabled>読み込み中</button>
      <button type="button" class="editor-button" id="editor-reload">プレビュー再読込</button>
      <button type="button" class="editor-button" id="editor-save" disabled>保存</button>
      <button type="button" class="editor-button" id="editor-reset" disabled>リセット</button>
      <button type="button" class="editor-button" id="editor-copy" disabled>JSONをコピー</button>
      <div class="viewport-control" role="group" aria-label="プレビュー幅">
        <button type="button" class="viewport-control__button is-active" data-viewport="desktop" aria-pressed="true">PC</button>
        <button type="button" class="viewport-control__button" data-viewport="tablet" aria-pressed="false">Tablet</button>
        <button type="button" class="viewport-control__button" data-viewport="mobile" aria-pressed="false">Mobile</button>
      </div>
    </div>
  </header>

  <main class="editor-main">
    <section class="status-panel" aria-label="編集状態" hidden>
      <p class="status-panel__text" id="editor-status" aria-live="polite">プレビューを読み込んでいます。</p>
      <p class="status-panel__meta" id="editor-meta">保存先: localStorage / speedad.loginFrontReasonsEditor.v1</p>
    </section>

    <section class="preview-section" aria-label="複製プレビュー">
      <div class="preview-frame" id="preview-frame" data-viewport="desktop">
        <iframe id="editor-preview" src="../index.html" title="ログイン前トップ複製プレビュー"></iframe>
      </div>
    </section>
  </main>

  <div class="editor-toast" id="editor-toast" aria-live="polite"></div>

  <script src="../js/login-front-reasons-editor.js" defer></script>
</body>
</html>
