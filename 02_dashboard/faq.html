<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPEED-AD - よくある質問</title>

    <link rel="icon" href="assets/svg/speedad_logo.svg" type="image/svg+xml">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Material Icons CDN -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="service-top-style.css">
    <!-- ヘルプセンター共通スタイル（キーワードチップ / mark / feedback-btn 等を流用） -->
    <link rel="stylesheet" href="src/help-center.css">
    <!-- FAQページ専用CSS -->
    <link rel="stylesheet" href="assets/css/faq.css">
    <!-- Custom Fonts -->
    <link rel="preconnect" href="https://fonts.gstatic.com/" crossorigin>
    <link as="style" href="https://fonts.googleapis.com/css2?display=swap&family=Inter%3Awght%40400%3B500%3B700%3B900&family=Noto+Sans+JP%3Awght%40400%3B500%3B700%3B900" onload="this.rel='stylesheet'" rel="stylesheet">
</head>
<body class="bg-background text-on-background" data-page-id="faq">

<div class="relative flex min-h-screen flex-col overflow-x-hidden">

    <!-- サイドバー用オーバーレイ -->
    <div id="mobileSidebarOverlay" class="mobile-sidebar-overlay lg:hidden"></div>

    <!-- ヘッダー -->
    <div id="header-placeholder"></div>

    <div class="flex flex-1 pt-16 bg-background">
        <!-- サイドバー -->
        <div id="sidebar-placeholder"></div>

        <!-- メインコンテンツ -->
        <main class="flex flex-1 flex-col" id="main-content">

            <!-- ヒーローセクション -->
            <section class="relative help-center-hero faq-hero px-4 sm:px-6 lg:px-8 py-16 text-center">
                <div class="relative max-w-2xl mx-auto">
                    <h1 class="text-4xl font-bold tracking-tight text-white text-shadow-sm mb-4">よくある質問</h1>
                    <p class="text-lg text-gray-200 text-shadow-sm mb-8">お困りごとをキーワードで検索、またはカテゴリから探せます。</p>
                    <form role="search" class="relative" onsubmit="return false;">
                        <span class="material-icons absolute left-4 top-1/2 -translate-y-1/2 text-white text-2xl pointer-events-none" aria-hidden="true">search</span>
                        <input type="search" id="search-box" name="query" aria-label="質問をキーワードで検索" placeholder="例：パスワード、料金プラン、名刺データ化" class="w-full h-16 pl-14 pr-14 py-2 text-lg bg-surface border-2 border-outline rounded-full focus:ring-primary focus:border-primary transition text-gray-900 placeholder-gray-400">
                        <button type="button" id="clear-search-btn" class="faq-clear-btn hidden" aria-label="検索キーワードをクリア">
                            <span class="material-icons" aria-hidden="true">close</span>
                        </button>
                    </form>
                    <div id="popular-keywords-wrapper" class="mt-6 flex flex-wrap justify-center gap-2" aria-label="人気のキーワード">
                        <!-- JSで動的に生成 -->
                    </div>
                </div>
            </section>

            <!-- メインコンテンツコンテナ -->
            <div class="w-full max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">

                <!-- パンくずリストコンテナ -->
                <nav aria-label="パンくず" class="py-6">
                    <div id="breadcrumb-container"></div>
                </nav>

                <!-- ローディングインジケーター -->
                <div id="loading-indicator" class="text-center py-10 hidden" aria-live="polite" aria-busy="true">
                    <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-primary border-t-transparent"></div>
                    <p class="mt-4 text-on-surface-variant">読み込み中...</p>
                </div>

                <!-- エラーメッセージ -->
                <div id="error-message" class="hidden my-8" role="alert" aria-live="assertive"></div>

                <!-- FAQコンテンツ -->
                <div id="faq-container" class="hidden pb-8">

                    <!-- カテゴリカード -->
                    <section id="category-cards-section" class="pb-8" aria-labelledby="category-cards-title">
                        <h2 id="category-cards-title" class="text-2xl font-bold text-on-background text-center mb-8">カテゴリから探す</h2>
                        <div id="category-cards" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                            <!-- JSで動的に生成 -->
                        </div>
                    </section>

                    <!-- 注目の質問 -->
                    <section id="featured-questions" class="pt-8 pb-8 border-t border-outline-variant" aria-labelledby="featured-title">
                        <h2 id="featured-title" class="text-2xl font-bold text-on-background mb-6 flex items-center gap-2">
                            <span class="material-icons text-primary" aria-hidden="true">star</span>
                            注目の質問
                        </h2>
                        <div id="featured-questions-list" class="space-y-4">
                            <!-- JSで動的に生成 -->
                        </div>
                    </section>

                    <!-- 検索結果ステータス（件数・クリア導線） -->
                    <div id="search-status" class="pt-6 hidden" aria-live="polite" aria-atomic="true"></div>

                    <!-- カテゴリ別Q&Aリスト -->
                    <section id="faq-list-section" class="pt-8 pb-8 border-t border-outline-variant" aria-labelledby="faq-list-title">
                        <h2 id="faq-list-title" class="text-2xl font-bold text-on-background mb-6">すべての質問</h2>
                        <div id="faq-list" class="space-y-12">
                            <!-- JSで動的に生成 -->
                        </div>
                        <div id="no-results-message" class="text-center py-12 hidden">
                            <span class="material-icons text-5xl text-on-surface-variant mb-3" aria-hidden="true">search_off</span>
                            <p class="font-bold text-on-background">ご指定のキーワードに一致する質問は見つかりませんでした。</p>
                            <p class="text-sm text-on-surface-variant mt-1">単語を変えてお試しください。</p>
                            <button type="button" id="reset-search-btn" class="mt-4 inline-flex items-center gap-2 bg-surface text-primary border border-primary px-5 py-2 rounded-full font-semibold hover:bg-primary-container transition">
                                <span class="material-icons" aria-hidden="true">refresh</span>
                                検索をクリアしてすべて表示
                            </button>
                        </div>
                    </section>
                </div>
            </div>

            <!-- 解決しなかった場合 -->
            <section class="mt-8 mb-16 max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 w-full">
                <div class="bg-primary-container rounded-xl p-8 text-center">
                    <h2 class="text-xl font-bold text-on-primary-container mb-2">解決しませんでしたか？</h2>
                    <p class="text-on-primary-container mb-6">ヘルプセンターの記事やサポートチームがお手伝いします。</p>
                    <div class="flex flex-wrap justify-center gap-3">
                        <a href="help-center.html" class="inline-flex items-center gap-2 bg-surface text-primary border border-primary px-6 py-3 rounded-full font-semibold hover:bg-primary-container transition">
                            <span class="material-icons" aria-hidden="true">menu_book</span>
                            ヘルプセンターを見る
                        </a>
                        <a href="bug-report.html" class="inline-flex items-center gap-2 bg-primary text-on-primary px-6 py-3 rounded-full font-semibold hover:opacity-90 transition">
                            <span class="material-icons" aria-hidden="true">mail</span>
                            お問い合わせ
                        </a>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <!-- フッター -->
    <div id="footer-placeholder"></div>

</div>

<!-- 既存のmain.jsと、FAQページ専用のJSを読み込む -->
<script type="module" src="src/main.js"></script>
<script type="module" src="src/faq.js"></script>

</body>
</html>
