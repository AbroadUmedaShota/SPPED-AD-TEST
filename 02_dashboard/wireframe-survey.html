<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 Column Layout Wireframe - SPEED-AD</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Material Icons CDN -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        .wire-box { 
            border: 2px dashed #94a3b8; 
            background-color: #f8fafc; 
            border-radius: 0.75rem; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .sticky-col { 
            position: sticky; 
            top: 2rem; 
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 p-4 md:p-8 min-h-screen">

    <div class="max-w-[90rem] mx-auto">
        <!-- Header / Breadcrumbs Mock -->
        <h1 class="text-3xl font-extrabold tracking-tight mb-8">アンケート作成・編集 (ワイヤーフレーム)</h1>

        <!-- 3-Column Grid Container -->
        <!-- 12カラムグリッドで全体のバランスを取ります -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">

            <!-- ============================== -->
            <!-- 1. アンケート基本情報 (2カラム分使用) -->
            <!-- 左カラム＋中央カラムの幅(span 9)を使います -->
            <!-- ============================== -->
            <div class="wire-box lg:col-span-9 bg-blue-50/50 border-blue-300 p-6 flex flex-col gap-4">
                <h2 class="text-lg font-bold text-blue-700 flex items-center gap-2">
                    <span class="material-icons">info</span> アンケート基本情報 (2カラム分使用)
                </h2>
                <div class="h-32 bg-white/80 border border-blue-200 rounded-lg flex items-center justify-center text-sm text-gray-400">
                    タイトル、説明文、イベント期間、メモ（横長に配置）
                </div>
            </div>

            <!-- ============================== -->
            <!-- 2. サイドパネル (ドキュメントマップ/追従) -->
            <!-- 右カラム(span 3)を使用し、縦に貫通。スクロール追従 -->
            <!-- ============================== -->
            <div class="wire-box lg:col-span-3 lg:row-span-2 sticky-col bg-purple-50/50 border-purple-300 p-5 h-[calc(100vh-6rem)] flex flex-col gap-4">
                <h2 class="text-lg font-bold text-purple-700 flex items-center gap-2">
                    <span class="material-icons">toc</span> ドキュメントマップ (サイドパネル)
                </h2>
                <div class="flex-1 bg-white/80 border border-purple-200 rounded-lg flex flex-col p-4 text-sm text-gray-600 gap-3 shadow-inner">
                    <div class="font-bold text-gray-800 border-b pb-2 mb-2">目次</div>
                    <div class="hover:text-primary cursor-pointer">・基本情報</div>
                    <div class="hover:text-primary cursor-pointer">・連携設定</div>
                    <div class="hover:text-primary cursor-pointer">・追加設定</div>
                    <div class="hover:text-primary cursor-pointer">・設問1</div>
                    <div class="hover:text-primary cursor-pointer">・設問2</div>
                    
                    <div class="mt-auto flex flex-col gap-2 pt-4 border-t">
                        <button class="w-full bg-white border border-gray-300 p-2 rounded text-center font-bold text-gray-700">プレビュー</button>
                        <button class="w-full bg-blue-600 text-white p-3 rounded text-center font-bold shadow">保存する</button>
                    </div>
                </div>
            </div>

            <!-- ============================== -->
            <!-- 3. 連携設定・追加設定 (1カラム構成) -->
            <!-- 左カラム(span 3 または span 4)の幅を使用 -->
            <!-- ============================== -->
            <div class="flex flex-col gap-6 lg:col-span-3">
                <div class="wire-box bg-emerald-50/50 border-emerald-300 p-5 flex flex-col gap-4">
                    <h2 class="text-base font-bold text-emerald-700 flex items-center gap-2">
                        <span class="material-icons">link</span> 連携設定 (1カラム)
                    </h2>
                    <div class="h-40 bg-white/80 border border-emerald-200 rounded-lg flex items-center justify-center text-sm text-gray-400">
                        名刺連携、多言語トグルなど
                    </div>
                </div>
                <div class="wire-box bg-emerald-50/50 border-emerald-300 p-5 flex flex-col gap-4">
                    <h2 class="text-base font-bold text-emerald-700 flex items-center gap-2">
                        <span class="material-icons">settings_suggest</span> 追加設定 (1カラム)
                    </h2>
                    <div class="h-64 bg-white/80 border border-emerald-200 rounded-lg flex items-center justify-center text-sm text-gray-400">
                        お礼メール、サンクス画面設定など
                    </div>
                </div>
            </div>

            <!-- ============================== -->
            <!-- 4. アンケートメインコンテンツ (1カラム構成) -->
            <!-- 中央カラム(span 6)を使用 -->
            <!-- ============================== -->
            <div class="wire-box lg:col-span-6 bg-orange-50/50 border-orange-300 p-5 min-h-[50vh] flex flex-col gap-4">
                <h2 class="text-lg font-bold text-orange-700 flex items-center gap-2">
                    <span class="material-icons">format_list_bulleted</span> アンケートメインコンテンツ (1カラム)
                </h2>
                <div class="flex-1 bg-white/80 border border-orange-200 rounded-lg flex flex-col p-6 gap-4 shadow-inner">
                    <div class="h-40 bg-gray-50 border border-gray-200 rounded-lg flex items-center justify-center text-gray-400">
                        設問1 (ドラッグ＆ドロップ領域)
                    </div>
                    <div class="h-40 bg-gray-50 border border-gray-200 rounded-lg flex items-center justify-center text-gray-400">
                        設問2
                    </div>
                    <div class="mt-4 border-2 border-dashed border-gray-300 p-4 rounded-xl flex justify-center text-indigo-500 font-bold hover:bg-indigo-50 cursor-pointer transition-colors">
                        + 設問を追加する
                    </div>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
