<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ - SPEED AD</title>
  <link rel="icon" href="assets/svg/speedad_logo.svg" type="image/svg+xml">
  <!-- 不具合報告ページはサポートサイトの「お問い合わせ」へ統合されました。/contact/ へ転送します。 -->
  <link rel="canonical" href="https://support.speed-ad.com/contact/">
  <noscript><meta http-equiv="refresh" content="0; url=https://support.speed-ad.com/contact/"></noscript>
  <script>
    (function () {
      var host = window.location.hostname;
      var isLocal = host === 'localhost' || host === '127.0.0.1' || window.location.protocol === 'file:';
      // ローカル開発では同一リポジトリ内のサポートサイトへ、本番では support サブドメインへ転送する。
      var target = isLocal ? '../05_support/contact/' : 'https://support.speed-ad.com/contact/';
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <p>このページは <a href="https://support.speed-ad.com/contact/">お問い合わせページ</a> へ移動しました。自動で移動しない場合はリンクをクリックしてください。</p>
</body>
</html>
